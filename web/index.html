<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- CSS 불러오기 -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 제목 태그로 이루진 엘리먼트 -->
    <h1>뉴스제목 1</h1>

    <!-- 내용 관련 엘리먼트 -->
    <p>기사 내용 입니다. 1</p>


    <!-- 링크이동 엘리먼트, 링크를 넣을 수 있는 태그, href = 속성 ""여기 안쪽에 링크 주소를 넣으면 된다 -->
    <a href="https://www.naver.com"> 네이버로 이동 </a>

    <!-- 부모 엘리먼트!, 단락을 나눌때 쓰는 태그 -->
    <div>
        <!-- 자식 엘리먼트 -->
        <h1 id="sub2" class="sub_2">뉴스 제목 2</h1>
        <p>기사 내용입니다. 2</p>

        <h1 class="sub_2 sub_2_2">뉴스 제목 2</h1>
        <p>기사 내용입니다. 2</p>
    </div>


    <!-- 아래 형식으로도 CSS형식이 작성 가능하다 -->
    <style>
        h1 {
            color: red;
        }

        div>h1 {
            color: blueviolet;
        }

        div {
            background-color: gray;
        }

        .sub_2 {
            background-color: yellow;
        }

        #sub2 {
            background-color: pink;
        }
    </style>
</body>

</html>
